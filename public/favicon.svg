<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" /> <!-- accent-cyan -->
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" /> <!-- accent-violet -->
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#030712" /> <!-- bg-primary -->
  <text 
    x="50%" 
    y="55%" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    fill="url(#brand-gradient)" 
    font-family="Inter, sans-serif" 
    font-weight="900" 
    font-size="45"
    letter-spacing="-2"
  >
    &lt;/&gt;
  </text>
</svg>
