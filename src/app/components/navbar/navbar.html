<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [ngClass]="{
    'py-4': !isScrolled(),
    'py-2 bg-bg-primary/80 backdrop-blur-lg border-b border-border-glass': isScrolled(),
  }"
>
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
    <!-- Brand -->
    <a href="#hero" class="text-2xl font-bold gradient-text z-50 relative">&lt;/dev&gt;</a>

    <!-- Desktop Menu & Lang -->
    <div class="hidden md:flex items-center gap-8">
      <ul class="flex items-center gap-8">
        @for (link of navLinks; track link.href) {
          <li>
            <a
              [href]="link.href"
              class="text-sm font-medium text-text-secondary hover:text-white transition-colors uppercase tracking-wider"
            >
              {{ link.labelKey | translate }}
            </a>
          </li>
        }
      </ul>

      <!-- Theme Toggle -->
      <button
        (click)="themeService.toggleTheme()"
        class="p-2 rounded-full border border-border-glass bg-bg-secondary/50 hover:bg-bg-secondary transition-all duration-300 text-text-primary flex items-center justify-center group"
        aria-label="Toggle theme"
      >
        @if (themeService.theme() === 'dark') {
          <svg
            class="w-5 h-5 transition-transform group-hover:rotate-12"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"
            />
          </svg>
        } @else {
          <svg
            class="w-5 h-5 transition-transform group-hover:-rotate-12"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
            />
          </svg>
        }
      </button>

      <!-- Language Toggle -->
      <button
        (click)="toggleLanguage()"
        class="flex items-center gap-2.5 px-3 py-1.5 rounded-full border border-border-glass bg-bg-secondary/50 hover:bg-bg-secondary transition-all duration-300 group"
        aria-label="Toggle language"
      >
        <div
          class="w-5 h-5 rounded-full overflow-hidden border border-white/10 transition-transform group-hover:scale-110 shadow-sm"
        >
          <img
            [src]="
              currentLang() === 'en'
                ? 'https://flagcdn.com/w80/us.png'
                : 'https://flagcdn.com/w80/es.png'
            "
            [alt]="currentLang() === 'en' ? 'English' : 'Español'"
            class="w-full h-full object-cover"
          />
        </div>
        <span class="text-xs font-bold text-text-primary uppercase tracking-wider">
          {{ currentLang() }}
        </span>
      </button>
    </div>

    <!-- Mobile Menu Button -->
    <div class="md:hidden flex items-center gap-3 z-50 relative">
      <button
        (click)="themeService.toggleTheme()"
        class="p-1.5 rounded-full border border-border-glass bg-bg-secondary/50 text-text-primary"
        aria-label="Toggle theme"
      >
        @if (themeService.theme() === 'dark') {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"
            />
          </svg>
        } @else {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
            />
          </svg>
        }
      </button>

      <button
        (click)="toggleLanguage()"
        class="flex items-center gap-2 px-2.5 py-1 rounded-full border border-border-glass bg-bg-secondary/50"
      >
        <div class="w-4 h-4 rounded-full overflow-hidden border border-white/10">
          <img
            [src]="
              currentLang() === 'en'
                ? 'https://flagcdn.com/w80/us.png'
                : 'https://flagcdn.com/w80/es.png'
            "
            class="w-full h-full object-cover"
            alt=""
          />
        </div>
        <span class="text-[10px] font-bold uppercase">{{ currentLang() }}</span>
      </button>

      <button
        (click)="toggleMobileMenu()"
        class="text-text-primary p-2 focus:outline-none"
        aria-label="Toggle mobile menu"
      >
        <svg
          class="w-6 h-6 transition-transform duration-300"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          @if (!isMobileMenuOpen()) {
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          } @else {
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          }
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div
    class="md:hidden fixed inset-0 bg-bg-primary/95 backdrop-blur-xl z-40 transition-all duration-300 flex flex-col items-center justify-center min-h-screen"
    [ngClass]="{
      'opacity-100 pointer-events-auto': isMobileMenuOpen(),
      'opacity-0 pointer-events-none': !isMobileMenuOpen(),
    }"
  >
    <ul class="flex flex-col items-center gap-8">
      @for (link of navLinks; track link.href) {
        <li>
          <a
            [href]="link.href"
            (click)="closeMobileMenu()"
            class="text-2xl font-bold text-text-secondary hover:text-white hover:text-shadow-glow transition-all uppercase tracking-widest"
          >
            {{ link.labelKey | translate }}
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
