<nav
  id="navbar"
  class="fixed top-0 left-0 w-full z-50 transition-all duration-300"
  [class.bg-bg-primary/80]="isScrolled()"
  [class.backdrop-blur-lg]="isScrolled()"
  [class.border-b]="isScrolled()"
  [class.border-border-glass]="isScrolled()"
>
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <a href="#hero" class="text-xl font-bold tracking-tight gradient-text"> &lt;/dev&gt; </a>

    <!-- Desktop Links -->
    <div class="hidden md:flex items-center gap-8">
      @for (link of navLinks; track link.href) {
        <a
          [href]="link.href"
          class="text-sm font-medium text-text-secondary hover:text-text-primary transition-colors duration-200 relative group"
        >
          {{ link.label }}
          <span
            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-gradient-to-r from-accent-violet to-accent-cyan transition-all duration-300 group-hover:w-full"
          ></span>
        </a>
      }
    </div>

    <!-- Mobile Toggle -->
    <button
      id="mobile-menu-toggle"
      class="md:hidden text-text-secondary hover:text-text-primary transition-colors"
      (click)="toggleMobileMenu()"
      aria-label="Toggle menu"
    >
      @if (isMobileMenuOpen()) {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      } @else {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      }
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen()) {
    <div
      class="md:hidden bg-bg-secondary/95 backdrop-blur-lg border-t border-border-glass animate-fade-in-up"
    >
      <div class="px-6 py-4 flex flex-col gap-4">
        @for (link of navLinks; track link.href) {
          <a
            [href]="link.href"
            class="text-sm font-medium text-text-secondary hover:text-text-primary transition-colors py-2"
            (click)="closeMobileMenu()"
          >
            {{ link.label }}
          </a>
        }
      </div>
    </div>
  }
</nav>
