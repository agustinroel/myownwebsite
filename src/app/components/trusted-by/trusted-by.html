<section class="py-12 border-y border-border-glass bg-bg-secondary/30" appScrollReveal>
  <div class="max-w-7xl mx-auto px-6">
    <h2
      class="text-[10px] md:text-xs font-bold tracking-[0.4em] uppercase text-text-secondary text-center mb-10 opacity-60"
    >
      {{ 'TRUSTED_BY.TITLE' | translate | uppercase }}
    </h2>

    <div
      class="flex flex-wrap justify-center items-center gap-8 md:gap-16 lg:gap-24 transition-all duration-700"
    >
      @for (client of clients; track client.name; let i = $index) {
        <div
          class="flex items-center justify-center transition-all duration-500 grayscale opacity-50 hover:grayscale-0 hover:opacity-100 hover:scale-110"
          appScrollReveal
          [delay]="i * 100"
        >
          <img
            [src]="client.logo"
            [alt]="client.name"
            (error)="onImageError($event)"
            [class]="client.className"
            class="w-auto object-contain transition-all duration-500"
          />
          <span class="hidden text-sm font-bold tracking-wider text-text-secondary">
            {{ client.name }}
          </span>
        </div>
      }
    </div>
  </div>
</section>
