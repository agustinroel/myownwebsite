<section class="trusted-by py-12 bg-primary/50 overflow-hidden border-y border-white/5">
  <div class="container mx-auto px-4">
    <h3
      class="text-center text-sm font-semibold uppercase tracking-widest text-secondary mb-10 opacity-70"
    >
      {{ 'TRUSTED_BY.TITLE' | translate | uppercase }}
    </h3>

    <div class="flex flex-wrap justify-center items-center gap-8 md:gap-16 lg:gap-24 opacity-60">
      @for (client of clients; track client.name) {
        <div
          class="client-logo-wrapper group relative flex items-center justify-center grayscale transition-all duration-500 hover:grayscale-0 hover:scale-110"
        >
          <img
            [src]="client.logo"
            [alt]="client.name"
            class="h-8 md:h-12 w-auto object-contain transition-transform duration-500"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'block';
            "
          />
          <span class="hidden text-white font-bold tracking-tight text-lg">{{ client.name }}</span>
        </div>
      }
    </div>
  </div>
</section>
