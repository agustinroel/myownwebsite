<!-- Floating Button -->
<button
  (click)="toggleChat()"
  class="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-accent-violet flex items-center justify-center text-white shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:scale-110 transition-transform duration-300"
  aria-label="Toggle AI Chat"
>
  @if (!isOpen()) {
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
      />
    </svg>
  } @else {
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M6 18L18 6M6 6l12 12"
      />
    </svg>
  }
</button>

<!-- Chat Window -->
@if (isOpen()) {
  <div
    class="fixed bottom-24 right-6 z-50 w-80 sm:w-96 rounded-2xl glass-panel border border-border-glass shadow-2xl flex flex-col overflow-hidden transition-all duration-300 transform origin-bottom-right"
    style="height: 500px; max-height: calc(100vh - 120px)"
  >
    <!-- Header -->
    <div
      class="p-4 border-b border-border-glass bg-bg-secondary/50 flex items-center justify-between"
    >
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="w-10 h-10 rounded-full bg-accent-violet/20 flex items-center justify-center">
            <span class="text-xl">🤖</span>
          </div>
          <div
            class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-bg-primary"
          ></div>
        </div>
        <div>
          <h3 class="font-semibold text-text-primary text-sm">Agustín AI</h3>
          <p class="text-xs text-text-secondary flex items-center gap-1">
            <svg class="w-3 h-3 text-accent-violet" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
              />
            </svg>
            Powered by Gemini
          </p>
        </div>
      </div>
      <button (click)="toggleChat()" class="text-text-secondary hover:text-text-primary">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <!-- Messages Area -->
    <div
      #scrollContainer
      class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide bg-bg-primary/50"
    >
      @if (!geminiService.isInitialized()) {
        <div class="flex justify-center items-center h-full">
          <div
            class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-accent-violet"
          ></div>
        </div>
      }

      @for (msg of geminiService.messages(); track $index) {
        <div
          class="flex"
          [ngClass]="{ 'justify-end': msg.role === 'user', 'justify-start': msg.role === 'model' }"
        >
          <div
            class="max-w-[80%] rounded-2xl px-4 py-2 text-sm shadow-sm"
            [ngClass]="{
              'bg-accent-violet text-white rounded-br-none': msg.role === 'user',
              'bg-bg-secondary text-text-primary rounded-bl-none border border-border-glass':
                msg.role === 'model',
            }"
          >
            {{ msg.text }}
          </div>
        </div>
      }

      @if (geminiService.isTyping()) {
        <div class="flex justify-start">
          <div
            class="bg-bg-secondary border border-border-glass rounded-2xl rounded-bl-none px-4 py-3 flex gap-1 items-center"
          >
            <div class="w-1.5 h-1.5 bg-text-secondary rounded-full animate-bounce"></div>
            <div
              class="w-1.5 h-1.5 bg-text-secondary rounded-full animate-bounce"
              style="animation-delay: 0.2s"
            ></div>
            <div
              class="w-1.5 h-1.5 bg-text-secondary rounded-full animate-bounce"
              style="animation-delay: 0.4s"
            ></div>
          </div>
        </div>
      }
    </div>

    <!-- Input Area -->
    <div class="p-3 border-t border-border-glass bg-bg-secondary/50">
      <div class="relative flex items-center">
        <textarea
          [ngModel]="userInput()"
          (ngModelChange)="userInput.set($event)"
          (keydown)="handleKeyDown($event)"
          placeholder="Escribe tu mensaje..."
          class="w-full bg-bg-primary border border-border-glass rounded-xl pl-4 pr-12 py-3 text-sm text-text-primary placeholder:text-text-secondary focus:outline-none focus:border-accent-violet/50 focus:ring-1 focus:ring-accent-violet/50 resize-none h-[44px] overflow-hidden leading-5"
          rows="1"
        ></textarea>
        <button
          (click)="sendMessage()"
          [disabled]="!userInput().trim() || geminiService.isTyping()"
          class="absolute right-2 w-8 h-8 flex items-center justify-center rounded-lg text-accent-violet hover:bg-accent-violet/10 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
}
