<section id="hero" class="relative min-h-screen flex items-center justify-center overflow-hidden">
  <!-- Background Glow Orbs -->
  <div class="glow-orb w-96 h-96 bg-accent-violet top-1/4 -left-48"></div>
  <div class="glow-orb w-80 h-80 bg-accent-cyan bottom-1/4 -right-40"></div>
  <div class="glow-orb w-64 h-64 bg-accent-pink top-2/3 left-1/3"></div>

  <!-- Grid overlay -->
  <div
    class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:60px_60px]"
  ></div>

  <!-- Content -->
  <div class="relative z-10 text-center px-6 max-w-4xl mx-auto pb-20 pt-24">
    <div class="animate-fade-in-up opacity-0">
      <p
        class="text-sm md:text-base font-medium tracking-[0.3em] uppercase text-text-secondary mb-6"
      >
        {{ 'HERO.SUBTITLE' | translate }}
      </p>
    </div>

    <div class="animate-fade-in-up opacity-0 animate-delay-100">
      <h1 class="text-5xl md:text-7xl lg:text-8xl font-extrabold leading-tight mb-6">
        {{ 'HERO.TITLE_PT1' | translate }}
        <span class="gradient-text"> {{ 'HERO.TITLE_PT2' | translate }}</span
        ><br />
        {{ 'HERO.TITLE_PT3' | translate }}
      </h1>
    </div>

    <div class="animate-fade-in-up opacity-0 animate-delay-200">
      <div class="text-xl md:text-2xl text-text-secondary font-light mb-10 h-8">
        <span>{{ displayText() }}</span>
        @if (showCursor()) {
          <span class="cursor-blink"></span>
        }
      </div>
    </div>

    <div class="animate-fade-in-up opacity-0 animate-delay-300">
      <p
        class="text-base md:text-lg text-text-secondary/80 max-w-2xl mx-auto mb-10 leading-relaxed"
      >
        {{ 'HERO.DESCRIPTION' | translate }}
      </p>
    </div>

    <div
      class="animate-fade-in-up opacity-0 animate-delay-400 flex flex-col sm:flex-row gap-4 justify-center"
    >
      <a
        href="#solutions"
        class="px-8 py-3.5 rounded-full bg-gradient-to-r from-accent-violet to-accent-cyan text-white font-semibold text-sm tracking-wide hover:shadow-lg hover:shadow-accent-violet/25 transition-all duration-300 hover:scale-105"
      >
        {{ 'HERO.CTA_PRIMARY' | translate }}
      </a>
      <a
        href="#contact"
        class="px-8 py-3.5 rounded-full border border-border-glass text-text-secondary font-semibold text-sm tracking-wide hover:border-accent-violet/50 hover:text-text-primary transition-all duration-300"
      >
        {{ 'HERO.CTA_SECONDARY' | translate }}
      </a>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 animate-bounce opacity-50">
    <svg class="w-4 h-4 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 14l-7 7m0 0l-7-7m7 7V3"
      />
    </svg>
  </div>
</section>
